{% extends "layout.html" %}

{% block title %}{{ post.title }}{% endblock %}

{% block content %}

<div class="post-card">

<h1 class="post-title">{{ post.title }}</h1>

<p class="post-meta">
By {{ post.author }} • {{ post.created_at }}
</p>

<p class="post-content">
{{ post.content }}
</p>

<div class="post-actions">

<a href="{% url 'edit_post' post.id %}" class="edit-btn">Edit</a>

<a href="{% url 'delete_post' post.id %}" class="delete-btn">Delete</a>

<a href="{% url 'post_list' %}" class="back-btn">Back</a>

</div>

</div>

{% endblock %}
