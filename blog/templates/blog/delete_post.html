{% extends "layout.html" %}

{% block title %}{{ post.title }}{% endblock  %}
{% block content %}
<h1>{{ post.title }}</h1>

<p>Are you sure you want to delete "{{ post.title }}"?</p>

<form method="POST">
    {% csrf_token %}
    <button type="submit">Delete</button>
</form>

<a href="{% url 'post_detail' post.id %}">Cancel</a>
{% endblock  %}
