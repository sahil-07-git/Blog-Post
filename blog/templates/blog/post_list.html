{% extends "layout.html" %}

{% block title %}
  {{ "Blog Posts" }}
{% endblock %}

{% block content %}

{% for post in posts %}
<div class="post-card">

<h2 class="post-title">
<a href="{% url 'post_detail' post.id %}">
{{ post.title }}
</a>
</h2>

<p class="post-meta">
By {{ post.author }} • {{ post.created_at }}
</p>

<p>{{ post.content|truncatechars:120 }}</p>

</div>
{% endfor %}

{% endblock %}
