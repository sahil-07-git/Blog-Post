{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}{% endblock %}</title>
  <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>
<body>
  <div class="container">
    <div class="top-bar">

      <a href="{% url 'post_list' %}" class="logo">
      Blog Posts
      </a>

        <div class="nav-links">

        {% if user.is_authenticated %}
        
        <a href="{% url 'post_list' %}" class="nav-btn-posts">Posts</a>

        <a href="{% url 'dashboard' %}" class="nav-btn">Dashboard</a>

        <a href="{% url 'logout' %}" class="nav-btn logout-btn">Logout</a>

        {% else %}

        <a href="{% url 'post_list' %}" class="nav-btn-posts">Posts</a>

        <a href="{% url 'login' %}" class="nav-btn">Login</a>

        <a href="{% url 'signup' %}" class="nav-btn create-btn">Signup</a>

        {% endif %}

        </div>

      </div>
  {% block content %}{% endblock %}
  </div>
</body>
</html>
